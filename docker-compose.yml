version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: creche_planning
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  php:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: creche_planning
      DB_USER: root
      DB_PASS: root
      JWT_SECRET: testing_secret_123456789
      APP_ENV: development
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    depends_on:
      - db

volumes:
  db_data:
